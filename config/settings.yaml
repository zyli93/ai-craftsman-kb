data_dir: ./data

embedding:
  provider: llamacpp
  model: v5-small-retrieval-Q8_0.gguf
  chunk_size: 2000
  chunk_overlap: 200

llm:
  filtering:
    provider: openrouter
    model: meta-llama/llama-3.1-8b-instruct
    # rate_limit: 60
  entity_extraction:
    provider: openrouter
    model: meta-llama/llama-3.1-8b-instruct
    # rate_limit: 60
  briefing:
    provider: anthropic
    model: claude-sonnet-4-20250514
    # rate_limit: 60
  source_discovery:
    provider: openrouter
    model: meta-llama/llama-3.1-8b-instruct
    # rate_limit: 60
  keyword_extraction:
    provider: openrouter
    model: meta-llama/llama-3.1-8b-instruct
    # rate_limit: 60

providers:
  openai:
    api_key: ${OPENAI_API_KEY}
  openrouter:
    api_key: ${OPENROUTER_API_KEY}
  anthropic:
    api_key: ${ANTHROPIC_API_KEY}
  fireworks:
    api_key: ${FIREWORKS_API_KEY}
  ollama:
    base_url: http://localhost:11434
  llamacpp:
    base_url: http://localhost:9990

youtube:
  api_key: ${YOUTUBE_API_KEY}
  transcript_langs: ["en"]

reddit:
  client_id: ${REDDIT_CLIENT_ID}
  client_secret: ${REDDIT_CLIENT_SECRET}

server:
  backend_port: 8000
  dashboard_port: 3000

search:
  default_limit: 20
  hybrid_weight_semantic: 0.6
  hybrid_weight_keyword: 0.4
