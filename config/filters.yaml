hackernews:
  enabled: true
  strategy: llm
  llm_prompt: |
    Rate this article 1-10 for relevance to these topics:
    - AI/ML engineering and research
    - Software architecture and systems design
    - Developer tools and productivity
    - LLM applications and agents
    - Tech industry strategy and business

    Article title: {title}
    Article excerpt: {excerpt}

    Respond with ONLY a number 1-10.
  min_score: 5
  keywords_exclude:
    - crypto
    - NFT
    - blockchain

reddit:
  enabled: true
  strategy: hybrid
  min_upvotes: 10
  keywords_exclude:
    - meme

substack:
  enabled: false

youtube:
  enabled: false

arxiv:
  enabled: true
  strategy: keyword
  keywords_include:
    - transformer
    - language model
    - reinforcement learning

rss:
  enabled: false

devto:
  enabled: true
  strategy: keyword
  min_reactions: 5
